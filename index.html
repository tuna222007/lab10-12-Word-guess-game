<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word-guess Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
    <script src="word-list.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <div class="start-screen">
        <div class="start-card">
            <button class="back-btn hidden" aria-label="Go back"><i class="fa-solid fa-arrow-left"></i></button>
            <h2>Word-guess Game</h2>
            <p>choose play to start the game, preview to see all the words can be appear in game</p>
            <div class="menu-actions">
                <button class="play-btn">Play</button>
                <button class="preview-btn">Preview Words</button>
            </div>
            <div class="preview-panel hidden">
                <div class="preview-media">
                    <img class="preview-image" src="#" alt="preview word image">
                </div>
                <p class="preview-word">-</p>
                <div class="preview-controls">
                    <button class="preview-arrow-btn preview-prev" aria-label="Previous word"><i class="fa-solid fa-arrow-left"></i></button>
                    <button class="preview-arrow-btn preview-next" aria-label="Next word"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
            <div class="category-selector hidden">
                <button class="category-btn" data-category="food" aria-label="Choose food category">
                    <img src="images/food-cate.png" alt="food category">
                    <span>Food</span>
                </button>
                <button class="category-btn" data-category="sport" aria-label="Choose sports category">
                    <img src="images/sports-cate.png" alt="sports category">
                    <span>Sports</span>
                </button>
                <button class="category-btn" data-category="animal" aria-label="Choose animal category">
                    <img src="images/animal-cate.png" alt="animal category">
                    <span>Animal</span>
                </button>
            </div>
            <div class="mode-selector hidden">
                <button class="mode-btn" data-mode="easy">Easy</button>
                <button class="mode-btn" data-mode="medium">Medium</button>
                <button class="mode-btn" data-mode="hard">Hard</button>
            </div>
        </div>
    </div>
    <div class="game-modal">
        <div class="content">
            <img src="#" alt="gif">
            <h4>Game Over!</h4>
            <p>The correct word was: <b>rainbow</b></p>
            <div class="modal-actions">
                <button class="play-again">Play Again</button>
                <button class="secondary-action hidden">Choose another mode</button>
            </div>
        </div>
    </div>
    <div class="container hidden">
        <button class="in-game-back-btn" aria-label="Back to mode choosing"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="hangman-box">
            <img class="hangman-img" src="#" draggable="false" alt="hangman-img">
            <h1>Word-guess Game</h1>
        </div>
        <div class="game-box">
            <ul class="word-display"></ul>
            <h4 class="hint-text">Hint: <b></b></h4>
            <h4 class="mode-text">Mode: <b>-</b></h4>
            <div class="hint-actions">
                <button class="hint-btn" type="button" aria-label="Use hint to reveal one character">
                    <i class="fa-regular fa-lightbulb"></i>
                    <span>Hint (<b class="hint-count">0</b>)</span>
                </button>
            </div>
            <div class="energy-wrap">
                <h4 class="energy-text">Energy: <b>100%</b></h4>
                <div class="energy-bar" aria-label="Energy bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="100">
                    <div class="energy-fill"></div>
                </div>
            </div>
            <div class="keyboard"></div>
        </div>
    </div>
</body>

</html>
