<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word-guess Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="word-list.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <div class="start-screen">
        <div class="start-card">
            <h2>Word-guess Game</h2>
            <p>choose play to start the game, preview to see all the words can be appear in game</p>
            <button class="play-btn">Play</button>
            <div class="category-selector hidden">
                <button class="category-btn" data-category="food" aria-label="Choose food category">
                    <img src="images/food-cate.png" alt="food category">
                    <span>Food</span>
                </button>
                <button class="category-btn" data-category="sport" aria-label="Choose sports category">
                    <img src="images/sports-cate.png" alt="sports category">
                    <span>Sports</span>
                </button>
                <button class="category-btn" data-category="animal" aria-label="Choose animal category">
                    <img src="images/animal-cate.png" alt="animal category">
                    <span>Animal</span>
                </button>
            </div>
            <div class="mode-selector hidden">
                <button class="mode-btn" data-mode="easy">Easy</button>
                <button class="mode-btn" data-mode="medium">Medium</button>
                <button class="mode-btn" data-mode="hard">Hard</button>
            </div>
        </div>
    </div>
    <div class="game-modal">
        <div class="content">
            <img src="#" alt="gif">
            <h4>Game Over!</h4>
            <p>The correct word was: <b>rainbow</b></p>
            <button class="play-again">Play Again</button>
        </div>
    </div>
    <div class="container hidden">
        <div class="hangman-box">
            <img class="hangman-img" src="#" draggable="false" alt="hangman-img">
            <h1>Word-guess Game</h1>
        </div>
        <div class="game-box">
            <ul class="word-display"></ul>
            <h4 class="hint-text">Hint: <b></b></h4>
            <h4 class="mode-text">Mode: <b>-</b></h4>
            <div class="energy-wrap">
                <h4 class="energy-text">Energy: <b>100%</b></h4>
                <div class="energy-bar" aria-label="Energy bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="100">
                    <div class="energy-fill"></div>
                </div>
            </div>
            <div class="keyboard"></div>
        </div>
    </div>
</body>

</html>
